<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhat Care</title>
    
    <script>window.onerror = function(message, source, lineno) { console.error("Global Error:", message, lineno); };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gold: { 100: '#fbf5d5', 300: '#f0d78c', 400: '#e6c255', 500: '#d4a72c', 600: '#b6831d' },
                        night: { 800: '#151b2b', 900: '#0b0f19', 950: '#02040a' },
                        teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s infinite',
                        'breathe': 'breathe 8s ease-in-out infinite',
                        'slideUp': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'slideDown': 'slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'fadeIn': 'fadeIn 0.4s ease-out',
                        'aura-smooth': 'morph-smooth 8s ease-in-out infinite',
                        'aura-stressed': 'morph-stressed 3s ease-in-out infinite'
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        breathe: { '0%, 100%': { transform: 'scale(1)', opacity: '0.8' }, '50%': { transform: 'scale(1.2)', opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        slideDown: { '0%': { transform: 'translateY(-20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        'morph-smooth': { 
                            '0%, 100%': { borderRadius: '40% 60% 70% 30% / 40% 50% 60% 50%' }, 
                            '34%': { borderRadius: '70% 30% 50% 50% / 30% 30% 70% 70%' }, 
                            '67%': { borderRadius: '100% 60% 60% 100% / 100% 100% 60% 60%' } 
                        },
                        'morph-stressed': {
                            '0%, 100%': { borderRadius: '20% 80% 30% 70% / 80% 20% 70% 30%' },
                            '50%': { borderRadius: '70% 30% 80% 20% / 30% 70% 20% 80%' }
                        }
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .dark .glass-panel { background: rgba(15, 20, 30, 0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }
        .text-gradient-gold { background: linear-gradient(135deg, #d4a72c 0%, #f0d78c 50%, #b6831d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .emergency-mode { background-color: #000000 !important; color: #ff0000 !important; z-index: 9999; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .print-only { display: none; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; }
            .glass-panel { background: white !important; border: none !important; box-shadow: none !important; color: black !important;}
            .dark .glass-panel * { color: black !important; }
            .print-only-hide { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 transition-colors duration-500 dark:bg-night-950 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🔒 PERSONAL API KEY CONFIGURATION
        // ==========================================
        const API_KEY = ""; 

        const { useState, useEffect, useRef, useMemo, createContext, useContext } = React;

        // --- ICONS ---
        const Icon = ({ name, size = 24, className = "", fill="none" }) => {
            const paths = {
                activity: "M22 12h-4l-3 9L9 3l-3 9H2", alert: "m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z M12 9v4 M12 17h.01",
                search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z M21 21l-4.35-4.35", 
                pill: "m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z M8.5 8.5l7 7", home: "m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22v-10h6v10",
                grid: "M3 3h7v7H3z M14 3h7v7h-7z M14 14h7v7h-7z M3 14h7v7H3z", user: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",
                zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z", clock: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 6v6l4 2",
                trendingUp: "M23 6l-9.5 9.5-5-5L1 18 M17 6h6v6", barChart: "M18 20V10 M12 20V4 M6 20v-6",
                trash: "M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2", plus: "M12 5v14 M5 12h14",
                droplet: "M12 2.69l5.74 5.74a8.12 8.12 0 0 1 2.26 5.74c0 4.42-3.58 8-8 8s-8-3.58-8-8a8.12 8.12 0 0 1 2.26-5.74L12 2.69z",
                shield: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z", check: "M20 6L9 17l-5-5", fileText: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8",
                loader: "M12 2v4 M12 18v4 M4.93 4.93l2.83 2.83 M16.24 16.24l2.83 2.83 M2 12h4 M18 12h4 M4.93 19.07l2.83-2.83 M16.24 7.76l2.83-2.83",
                cpu: "M4 4h16v16H4z M9 9h6v6H9z M9 1v3 M15 1v3 M9 20v3 M15 20v3 M20 9h3 M20 14h3 M1 9h3 M1 14h3", award: "M12 15l-2 5l2 2l2 -2l-2 -5 M12 8a6 6 0 1 1 0 -12a6 6 0 0 1 0 12z M12 3v1 M9 4l.5 1 M15 4l-.5 1",
                x: "M18 6L6 18 M6 6l12 12", camera: "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M12 9a4 4 0 1 0 0 8 4 4 0 0 0 0-8z",
                upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12", users: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75",
                chevronDown: "M6 9l6 6 6-6", eye: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", coffee: "M18 8h1a4 4 0 0 1 0 8h-1 M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z M6 1v3 M10 1v3 M14 1v3"
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={paths[name] || paths.activity} /></svg>;
        };

        // --- SCHEMAS ---
        const Schemas = {
            symptom: { type: "OBJECT", properties: { isRedFlag: { type: "BOOLEAN" }, summary: { type: "STRING" }, clinicalSummary: { type: "STRING" }, causes: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, prob: { type: "STRING" }, confidence: { type: "INTEGER" }, evidence: { type: "STRING" } } } }, triggers: { type: "ARRAY", items: { type: "STRING" } }, severity: { type: "INTEGER" } } },
            medicine: { type: "OBJECT", properties: { name: { type: "STRING" }, use: { type: "STRING" }, safety: { type: "STRING" }, warning: { type: "STRING" }, severityLevel: { type: "STRING" }, interactions: { type: "ARRAY", items: { type: "STRING" } } } },
            doctorExport: { type: "OBJECT", properties: { summary: { type: "STRING" }, progressionAnalysis: { type: "STRING" }, concerns: { type: "ARRAY", items: { type: "STRING" } }, questionsToAsk: { type: "ARRAY", items: { type: "STRING" } } } },
            healthTwin: { type: "OBJECT", properties: { energyPrediction: { type: "STRING" }, symptomRisk: { type: "STRING" }, advice: { type: "STRING" } } },
            forecast: { type: "OBJECT", properties: { flareUpRisk: { type: "INTEGER" }, burnoutRisk: { type: "INTEGER" }, stressIndex: { type: "INTEGER" }, aiInsight: { type: "STRING" }, activeTasks: { type: "ARRAY", items: { type: "STRING" } } } },
            reportAnalysis: { type: "OBJECT", properties: { summary: { type: "STRING" }, diagnosisOrStatus: { type: "STRING" }, abnormalValues: { type: "ARRAY", items: { type: "STRING" } }, recommendations: { type: "ARRAY", items: { type: "STRING" } } } },
            faceScan: { type: "OBJECT", properties: { overallHealth: { type: "STRING" }, dehydrationLevel: { type: "STRING" }, sleepDeficit: { type: "STRING" }, stressIndicators: { type: "STRING" }, recommendation: { type: "STRING" } } },
            foodScan: { type: "OBJECT", properties: { energyCurve: { type: "STRING" }, triggerWarnings: { type: "ARRAY", items: { type: "STRING" } }, nutritionalVibe: { type: "STRING" }, recommendation: { type: "STRING" } } }
        };

        // --- API HELPER ---
        async function fetchGemini(prompt, systemInstruction, imageData, schema) {
            if (API_KEY === "YOUR_API_KEY_HERE" || !API_KEY) throw new Error("Please add your Gemini API Key in the codebase.");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
            const contents = [{ role: "user", parts: [{ text: prompt }, ...(imageData ? [{ inline_data: { mime_type: imageData.mimeType, data: imageData.data } }] : [])] }];
            let retries = 3, delay = 1000;
            while (retries > 0) {
                try {
                    const generationConfig = { responseMimeType: "application/json" };
                    if (schema) generationConfig.responseSchema = schema;
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents, systemInstruction: { parts: [{ text: systemInstruction }] }, generationConfig }) });
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    
                    const data = await response.json();
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    
                    // Cleanup possible Markdown wrapping returned by Gemini
                    if (text.startsWith("```")) {
                        text = text.replace(/^```(json)?\n?/, '').replace(/\n?```$/, '').trim();
                    }
                    
                    return JSON.parse(text);
                } catch (error) { retries--; if (retries === 0) throw error; await new Promise(r => setTimeout(r, delay)); delay *= 2; }
            }
        }

        // --- TOAST CONTEXT ---
        const ToastContext = createContext(null);
        const ToastProvider = ({ children }) => {
            const [toast, setToast] = useState(null);
            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3500); };
            return (
                <ToastContext.Provider value={showToast}>
                    {children}
                    {toast && (
                        <div className={`fixed top-6 left-1/2 transform -translate-x-1/2 z-[99999] px-6 py-3 rounded-full text-white text-sm font-bold shadow-2xl animate-slideDown flex items-center gap-2 ${toast.type === 'error' ? 'bg-red-500' : toast.type === 'warning' ? 'bg-orange-500' : 'bg-teal-600'}`}>
                            <Icon name={toast.type === 'error' ? 'alert' : 'check'} size={18} /> {toast.message}
                        </div>
                    )}
                </ToastContext.Provider>
            );
        };

        // --- GLOBAL UI COMPONENTS ---
        const AnimatedBg = ({ mood }) => {
            const getColors = () => {
                if(mood === '😢') return ['bg-indigo-500/20', 'bg-blue-600/10']; 
                if(mood === '😁') return ['bg-orange-500/20', 'bg-yellow-500/10']; 
                if(mood === '🚨') return ['bg-red-600/30', 'bg-red-900/20']; 
                return ['bg-teal-400/20', 'bg-gold-400/20']; 
            };
            const [c1, c2] = getColors();
            return (
                <div className="fixed inset-0 z-[-1] overflow-hidden pointer-events-none transition-colors duration-1000">
                    <div className={`absolute top-[-10%] left-[-10%] w-[50%] h-[50%] ${c1} rounded-full blur-[100px] animate-pulse-slow transition-colors duration-1000`}></div>
                    <div className={`absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] ${c2} rounded-full blur-[100px] animate-pulse-slow transition-colors duration-1000`} style={{animationDelay: '2s'}}></div>
                </div>
            );
        };

        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`relative flex flex-col items-center gap-1 transition-all duration-300 ${active ? 'text-teal-500 -translate-y-1' : 'text-slate-400 hover:text-slate-500 dark:hover:text-slate-300'}`}>
                <Icon name={icon} size={22} strokeWidth={active ? 2.5 : 2} />
                <span className={`text-[10px] font-bold tracking-wide transition-opacity ${active ? 'opacity-100' : 'opacity-0'}`}>{label}</span>
                {active && <span className="absolute -bottom-2 w-1 h-1 bg-current rounded-full drop-shadow-[0_0_5px_rgba(45,212,191,0.8)]"></span>}
            </button>
        );

        // --- FEATURE: THE LIVING AURA ---
        const LivingAura = ({ score }) => {
            let status = 'optimal', colorClass = 'text-teal-400 shadow-teal-500/50 from-teal-400/20 to-teal-600/40 border-teal-400/30';
            let animClass = 'animate-aura-smooth';
            if (score <= 50) {
                status = 'critical'; colorClass = 'text-red-500 shadow-red-500/50 from-red-500/20 to-red-700/40 border-red-500/30'; animClass = 'animate-aura-stressed';
            } else if (score <= 80) {
                status = 'moderate'; colorClass = 'text-gold-400 shadow-gold-500/50 from-gold-400/20 to-gold-600/40 border-gold-400/30'; animClass = 'animate-aura-smooth';
            }

            return (
                <div className="relative w-48 h-48 mx-auto my-8 flex items-center justify-center">
                    <div className={`absolute inset-0 bg-gradient-to-tr backdrop-blur-md border ${colorClass} ${animClass} z-10 flex flex-col items-center justify-center transition-all duration-1000`}>
                        <Icon name="activity" size={36} className="drop-shadow-lg mb-1" />
                        <span className="text-2xl font-black drop-shadow-md">{score}%</span>
                    </div>
                    {/* Glowing outer rings */}
                    <div className={`absolute inset-[-10px] border-2 border-dashed ${colorClass.split(' ')[0]} opacity-30 animate-spin-slow rounded-full`}></div>
                    <div className={`absolute inset-[-20px] bg-current opacity-20 filter blur-[30px] rounded-full ${colorClass.split(' ')[0]}`}></div>
                </div>
            );
        };

        // --- FEATURE: INTERACTIVE BODY MAP ---
        const BodyMap = ({ onSelect }) => {
            return (
                <div className="w-full flex flex-col items-center animate-slideUp">
                    <span className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Tap to pinpoint region</span>
                    
                    <div className="relative w-[260px] h-[420px] bg-black/5 dark:bg-black/20 rounded-[3rem] p-4 border border-white/5 shadow-[inset_0_0_50px_rgba(0,0,0,0.2)] overflow-hidden flex justify-center">
                        
                        {/* Glowing Aura Background */}
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-64 bg-teal-500/10 rounded-full blur-[40px] animate-pulse-slow"></div>

                        {/* Head */}
                        <button onClick={() => onSelect('Head & Neck')} className="absolute top-[30px] left-1/2 -translate-x-1/2 w-14 h-16 rounded-[40%] bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-20"></button>
                        
                        {/* Chest */}
                        <button onClick={() => onSelect('Chest & Heart')} className="absolute top-[100px] left-1/2 -translate-x-1/2 w-24 h-20 rounded-[2rem] bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-20"></button>
                        
                        {/* Abdomen */}
                        <button onClick={() => onSelect('Abdomen & Pelvis')} className="absolute top-[185px] left-1/2 -translate-x-1/2 w-20 h-20 rounded-[2rem] bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-20"></button>
                        
                        {/* Arms */}
                        <button onClick={() => onSelect('Arms & Hands')} className="absolute top-[105px] left-[35px] w-9 h-28 rounded-full bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-10 origin-top rotate-12"></button>
                        <button onClick={() => onSelect('Arms & Hands')} className="absolute top-[105px] right-[35px] w-9 h-28 rounded-full bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-10 origin-top -rotate-12"></button>
                        
                        {/* Legs */}
                        <button onClick={() => onSelect('Legs & Feet')} className="absolute top-[270px] left-[75px] w-11 h-32 rounded-full bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-10"></button>
                        <button onClick={() => onSelect('Legs & Feet')} className="absolute top-[270px] right-[75px] w-11 h-32 rounded-full bg-teal-500/20 hover:bg-teal-500/40 border border-teal-400/30 backdrop-blur-md transition-all active:scale-95 z-10"></button>

                        {/* Connecting lines / Nervous system aesthetic */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-30 z-0" stroke="currentColor" strokeWidth="1.5" fill="none">
                            <path d="M130 60 L130 350 M130 140 L70 180 M130 140 L190 180" className="text-teal-400"/>
                        </svg>
                    </div>
                    
                    <button onClick={() => onSelect('Systemic / General')} className="mt-6 w-[260px] py-4 rounded-2xl bg-white/5 border border-white/10 dark:text-white text-xs font-bold uppercase tracking-widest hover:bg-white/10 transition-colors shadow-lg active:scale-95">Select General Area</button>
                </div>
            );
        };

        // 1. LOADING SCREEN
        const LoadingScreen = () => (
            <div className="fixed inset-0 bg-night-950 flex flex-col items-center justify-center z-[9999] animate-fadeIn">
                <div className="w-24 h-24 bg-gradient-to-br from-teal-400 to-teal-600 rounded-[2rem] shadow-[0_0_50px_rgba(45,212,191,0.4)] flex items-center justify-center text-white font-bold text-5xl animate-breathe">B</div>
                <h1 className="mt-8 text-3xl font-bold text-white tracking-widest font-cinzel text-gradient-gold">BHAT CARE</h1>
                <p className="text-teal-500 text-xs tracking-widest uppercase mt-3 animate-pulse">Initializing Ambient Intelligence...</p>
            </div>
        );

        // 2. ONBOARDING / LOGIN PAGE
        const Onboarding = ({ onComplete, isAddingFamily = false, onCancel }) => {
            const [form, setForm] = useState({ id: Date.now().toString(), name: '', age: '', weight: '', height: '', waterGoal: 2000, conditions: '', emergencyContactPhone: '', cabinet: [], history: [], symptomLogs: [] });
            
            const handleSubmit = () => {
                if (!form.name) return alert("Please enter a name.");
                onComplete({ ...form, waterCurrent: 0, mood: '😐', isRegistered: true });
            };

            return (
                <div className="min-h-screen bg-night-950 flex flex-col relative overflow-hidden animate-fadeIn z-[100] absolute inset-0">
                    <div className="absolute inset-0 z-0"><AnimatedBg mood="😐" /></div>
                    <div className="relative z-10 flex-1 flex flex-col p-6 max-w-md mx-auto w-full pt-12">
                        
                        <div className="flex justify-between items-center mb-6">
                            {isAddingFamily ? <button onClick={onCancel} className="text-slate-400"><Icon name="x"/></button> : <div></div>}
                        </div>

                        <div className="text-center mb-8">
                            <div className="w-16 h-16 mx-auto bg-gradient-to-br from-teal-400 to-teal-600 rounded-2xl shadow-lg shadow-teal-500/50 flex items-center justify-center text-white font-bold text-2xl mb-4">B</div>
                            <h1 className="text-3xl font-bold text-white font-cinzel">{isAddingFamily ? "Add Family Pod" : "Welcome to Bhat"}</h1>
                            <p className="text-slate-400 text-sm mt-2">Let's set up the personal health baseline.</p>
                        </div>

                        <div className="glass-panel p-6 rounded-3xl space-y-5 flex-1 overflow-y-auto hide-scroll">
                            <div>
                                <label className="text-xs font-bold text-teal-400 uppercase">Name</label>
                                <input value={form.name} onChange={e=>setForm({...form, name: e.target.value})} placeholder="e.g. sehru" className="w-full bg-transparent border-b border-slate-700 py-2 text-white outline-none focus:border-teal-500 transition-colors" />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs font-bold text-teal-400 uppercase">Age</label>
                                    <input type="number" value={form.age} onChange={e=>setForm({...form, age: e.target.value})} placeholder="e.g. 55" className="w-full bg-transparent border-b border-slate-700 py-2 text-white outline-none focus:border-teal-500" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-teal-400 uppercase">Weight (kg)</label>
                                    <input type="number" value={form.weight} onChange={e=>setForm({...form, weight: e.target.value})} placeholder="e.g. 65" className="w-full bg-transparent border-b border-slate-700 py-2 text-white outline-none focus:border-teal-500" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-teal-400 uppercase">Height (cm)</label>
                                    <input type="number" value={form.height} onChange={e=>setForm({...form, height: e.target.value})} placeholder="e.g. 160" className="w-full bg-transparent border-b border-slate-700 py-2 text-white outline-none focus:border-teal-500" />
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-teal-400 uppercase">Water Goal (ml)</label>

        // --- MAIN APP ENTRY ---
        const MainApp = () => {

            const [darkMode, setDarkMode] = useState(true);

            // Centralized State
            const [appState, setAppState] = useState(() => {
                const saved = localStorage.getItem('bhat_care_v5');
                if (saved) return JSON.parse(saved);
                
                // Migration from V4
                const oldUser = localStorage.getItem('bhat_care_user');
                const oldCab = localStorage.getItem('bhat_care_cabinet');
                if (oldUser) {
                    const u = JSON.parse(oldUser);
                    u.id = 'primary';
                    u.cabinet = oldCab ? JSON.parse(oldCab) : [];
                    return { profiles: [u], activeId: 'primary' };
                }
                return { profiles: [], activeId: null };
            });

            // Loading screen timer
            useEffect(() => { const timer = setTimeout(() => setIsLoading(false), 2000); return () => clearTimeout(timer); }, []);

            // Persistence
            useEffect(() => { localStorage.setItem('bhat_care_v5', JSON.stringify(appState)); }, [appState]);
            useEffect(() => { darkMode ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark'); }, [darkMode]);

            const activeUser = appState.profiles.find(p => p.id === appState.activeId);

            // Update Active User Helper
            const updateUser = (updates) => {
                setAppState(prev => ({
                    ...prev,
                    profiles: prev.profiles.map(p => p.id === prev.activeId ? { ...p, ...updates } : p)
                }));
            };

            // Daily History Logger
            useEffect(() => {
                if(!activeUser || !activeUser.isRegistered) return;
                const today = new Date().toISOString().split('T')[0];
                let hist = [...(activeUser.history || [])];
                const todayIdx = hist.findIndex(h => h.date === today);
                const entry = { date: today, water: activeUser.waterCurrent, mood: activeUser.mood };
                if(todayIdx >= 0) {
                    if (hist[todayIdx].water !== entry.water || hist[todayIdx].mood !== entry.mood) {
                        hist[todayIdx] = entry;
                        updateUser({ history: hist });
                    }
                } else {
                    hist.push(entry);
                    if(hist.length > 7) hist.shift(); 
                    updateUser({ history: hist });
                }
            }, [activeUser?.waterCurrent, activeUser?.mood]);

            const handleInitialOnboarding = (data) => {
                data.id = 'primary';
                setAppState({ profiles: [data], activeId: 'primary' });
                showToast("System Initialized Successfully", "success");
            };

            const toggleWater = () => { 
                const n = activeUser.waterCurrent >= activeUser.waterGoal ? 0 : activeUser.waterCurrent + 250; 
                if(n === activeUser.waterGoal && n > 0) showToast("Hydration Goal Met! 🔥", "success"); 
                updateUser({ waterCurrent: n }); 
            };

            const updateCabinet = (newCab) => updateUser({ cabinet: newCab });

            const logSymptom = (report) => {
                const newLogs = [...(activeUser.symptomLogs || []), { date: new Date().toISOString(), report }];
                updateUser({ symptomLogs: newLogs });
            };

            // Routing Flow
            if (isLoading) return <LoadingScreen />;
            if (appState.profiles.length === 0) return <Onboarding onComplete={handleInitialOnboarding} />;
            if (view === 'addFamily') return <Onboarding isAddingFamily onCancel={() => setView('dashboard')} onComplete={(data) => { setAppState(prev => ({ profiles: [...prev.profiles, data], activeId: data.id })); setView('dashboard'); showToast(`Added ${data.name} to Pod.`); }} />;
            if (emergencyMode) return <EmergencyScreen onClose={() => setEmergencyMode(false)} user={activeUser} />;

            // Application
            return (

                        {view === 'checker' && <SymptomChecker user={activeUser} logSymptom={logSymptom} setView={setView} setEmergencyMode={setEmergencyMode} />}

                        {view === 'faceScan' && <VisionScanner user={activeUser} mode="face" setView={setView} />}

        // --- SUB-COMPONENTS ---

        // --- FEATURE: DIGITAL HEALTH TWIN ---

                        {/* Stress Slider */}
                        <div>
                            <div className="flex justify-between mb-3">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Stress Level</span>

                            {loading ? <Icon name="loader" className="animate-spin" /> : 'Initiate Simulation'}

                    </div>

                    {result && (

                                <h3 className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">Energy Prediction</h3>
                                <p className="text-sm dark:text-white font-medium mt-1">{result.energyPrediction}</p>
                            </div>

                                <p className="text-sm dark:text-white font-medium mt-1">{result.symptomRisk}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-3xl border-l-4 border-teal-500">
                                <h3 className="text-[10px] font-bold text-teal-400 uppercase tracking-widest mb-1">AI Bio-Hacking Advice</h3>
                                <p className="text-sm dark:text-white font-medium mt-1">{result.advice}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // --- FAMILY POD HEADER ---
        const FamilyPodHeader = ({ appState, setAppState, setView, setEmergencyMode }) => {
            const [isOpen, setIsOpen] = useState(false);
            const activeUser = appState.profiles.find(p => p.id === appState.activeId);

            return (
                <header className="px-6 py-4 sticky top-0 z-40 print-only-hide relative">
                    <div className="absolute inset-0 glass-panel border-b border-white/10 z-0"></div>
                    <div className="relative z-10 flex justify-between items-center">
                        <div className="relative">
                            <button onClick={() => setIsOpen(!isOpen)} className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 hover:bg-black/10 dark:hover:bg-white/10 transition-colors">
                                <div className="w-8 h-8 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md">
                                    {activeUser.name.charAt(0).toUpperCase()}
                                </div>
                                <div className="text-left">
                                    <h1 className="font-bold text-sm dark:text-white leading-none">{activeUser.name}'s Cabin</h1>
                                    <span className="text-[9px] font-bold text-teal-600 dark:text-teal-400 uppercase tracking-widest">Bhat Care</span>
                                </div>
                                <Icon name="chevronDown" size={16} className={`text-slate-500 transition-transform ${isOpen ? 'rotate-180' : ''}`} />

                                    {appState.profiles.map(p => (
                                        <button key={p.id} onClick={() => { setAppState(prev => ({ ...prev, activeId: p.id })); setIsOpen(false); }} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-colors ${p.id === appState.activeId ? 'bg-teal-500/10 text-teal-600 dark:text-teal-400' : 'hover:bg-black/5 dark:hover:bg-white/5 dark:text-white'}`}>
                                            <div className="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center font-bold text-xs">{p.name.charAt(0).toUpperCase()}</div>

                        </div>
                    </div>
                </header>
            );
        };
        
        // --- 1️⃣ SMART HEALTH CABIN (DASHBOARD) ---
        const Dashboard = ({ user, setUser, setView, toggleWater }) => {
            const showToast = useContext(ToastContext);
            const waterPct = Math.min(100, (user.waterCurrent / user.waterGoal) * 100);
            
            const recoveryScore = useMemo(() => {
                let score = 100;
                if(user.mood === '😢') score -= 30;
                if(user.mood === '😐') score -= 10;
                if(waterPct < 50) score -= 15;
                if(user.symptomLogs && user.symptomLogs.length > 0) score -= 10;
                return Math.max(0, Math.round(score));
            }, [user]);

            const [forecast, setForecast] = useState(null);

            // Mood Fade-Out Logic
            const todayStr = new Date().toISOString().split('T')[0];
            const alreadyLogged = user.lastMoodDate === todayStr;
            const [isMoodFading, setIsMoodFading] = useState(false);
            const [showMood, setShowMood] = useState(!alreadyLogged);

            const handleMoodSelect = (emoji) => {
                setUser({ mood: emoji, lastMoodDate: todayStr });
                showToast("Daily Mood Logged", "success");
                setIsMoodFading(true);
                setTimeout(() => setShowMood(false), 500);
            };

            useEffect(() => {
                const fetchDailyForecast = async () => {
                    const sys = `You are Bhat Care AI. Generate a proactive health forecast. User age: ${user.age}. Recovery score is ${recoveryScore}. Hydration is at ${waterPct}%. Mood: ${user.mood}. Give a 1 sentence emotional anchor insight like 'Hydration improved your energy.' or 'You're trending towards fatigue.' Return strictly JSON schema.`;
                    try { const data = await fetchGemini(`Generate forecast.`, sys, null, Schemas.forecast); setForecast(data); } catch(e) {}
                };
                fetchDailyForecast();
            }, [user.mood, waterPct, recoveryScore]);

            return (
                <div className="space-y-6 animate-fadeIn pb-4">
                    
                    {/* Living Aura - The Aesthetic Anchor */}
                    <LivingAura score={recoveryScore} />

                    {forecast && (
                        <div className="glass-panel p-4 rounded-2xl flex items-start gap-3 animate-slideDown border-l-4 border-teal-500">
                            <Icon name="zap" className="text-teal-400 mt-1" />
                            <div>
                                <h4 className="text-xs font-bold text-teal-500 uppercase tracking-wide">AI Ambient Insight</h4>
                                <p className="text-sm dark:text-teal-50 font-medium italic mt-1">"{forecast.aiInsight}"</p>
                            </div>
                        </div>
                    )}

                        <div className={`transition-all duration-500 ease-in-out overflow-hidden ${isMoodFading ? 'max-h-0 opacity-0 scale-95' : 'max-h-40 opacity-100 scale-100'}`}>

                        </div>

                    {forecast && (

                                <span className="text-[8px] font-bold text-slate-400 uppercase mb-1 tracking-wider">Stress</span>

                        </div>
