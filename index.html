        };

        // --- UNIFIED VISION SCANNER (Face, Food, Report) ---
        const VisionScanner = ({ user, mode, setView }) => {
            const showToast = useContext(ToastContext);
            const [imgData, setImgData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [analysis, setAnalysis] = useState(null);

            const config = {
                face: {
                    title: "Face Wellness Scan", icon: "eye", color: "text-blue-400", bg: "bg-blue-500",
                    desc: "Take a selfie for an instant biometric visual analysis.", overlay: "rounded-[100px] border-4 border-dashed border-white/50 w-48 h-64",
                    sys: "Analyze this human face. Look for physical signs of sleep deficit (dark circles), dehydration (skin texture/lips), and stress. Be concise and diagnostic.",
                    schema: Schemas.faceScan
                },
                food: {
                    title: "Food-to-Fuel Lens", icon: "coffee", color: "text-green-400", bg: "bg-green-500",
                    desc: "Snap your meal to predict energy curves and trigger warnings.", overlay: "rounded-xl border-4 border-dashed border-white/50 w-64 h-64",
                    sys: `Analyze this food image. Patient conditions: ${user.conditions || 'None'}. Predict the energy curve (crash or sustained?), flag trigger ingredients based on conditions, and give a recommendation (e.g., drink water after).`,
                    schema: Schemas.foodScan
                },
                report: {
                    title: "Medical Report Analyzer", icon: "camera", color: "text-indigo-400", bg: "bg-indigo-500",
                    desc: "Upload a lab report or prescription for AI translation.", overlay: "rounded-sm border-2 border-dashed border-white/50 w-64 h-80",
                    sys: "Analyze this medical document. Extract summary, main diagnosis, list abnormal values, and recommendations.",
                    schema: Schemas.reportAnalysis
                }
            }[mode];

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const result = ev.target.result;
                    const mimeType = result.substring(result.indexOf(':') + 1, result.indexOf(';'));
                    const base64 = result.substring(result.indexOf(',') + 1);
                    setImgData({ mimeType, data: base64, preview: result });
                    setAnalysis(null);
                };
                reader.readAsDataURL(file);
            };

            const runAnalysis = async () => {
                if (!imgData) return;
                setLoading(true);
                try {
                    const data = await fetchGemini("Analyze this image.", config.sys, imgData, config.schema);
                    setAnalysis(data);
                    showToast("Analysis complete", "success");
                } catch(e) { showToast("Vision analysis failed.", "error"); }
                setLoading(false);
            };

            return (
                <div className="space-y-6 pb-10 animate-fadeIn h-full flex flex-col">
                    <div className="flex items-center gap-2 mb-2">
                        <button onClick={() => setView('tools')} className="text-slate-400 p-1 bg-white/5 rounded-full"><Icon name="x"/></button>
                        <h2 className={`text-xl font-bold ${config.color} flex items-center gap-2`}><Icon name={config.icon}/> {config.title}</h2>
                    </div>
                    <p className="text-slate-400 text-sm">{config.desc}</p>

                    {!analysis ? (
                        <div className="flex-1 flex flex-col">
                            {imgData ? (
                                <div className="space-y-6 animate-slideUp">
                                    <div className="relative mx-auto max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-white/10 bg-black">
                                        <img src={imgData.preview} alt="Scan Preview" className="w-full h-auto opacity-80" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-6">
                                            <button onClick={runAnalysis} disabled={loading} className={`w-full py-4 ${config.bg} text-white rounded-2xl font-black text-lg shadow-lg flex justify-center items-center gap-2 transform active:scale-95 transition-all`}>
                                                {loading ? <Icon name="loader" className="animate-spin" /> : 'Initiate Scan'}
                                            </button>
                                        </div>
                                    </div>
                                    <button onClick={() => setImgData(null)} className="w-full text-slate-400 font-bold text-xs uppercase tracking-widest text-center">Retake Image</button>
                                </div>
                            ) : (
                                <div className="flex-1 relative glass-panel rounded-3xl overflow-hidden flex flex-col items-center justify-center bg-black/5 dark:bg-black/40 min-h-[60vh]">
                                    <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-10"><div className={config.overlay}></div></div>
                                    <div className="absolute inset-0 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==')] opacity-50 z-0"></div>
                                    
                                    <div className={`w-20 h-20 ${config.bg}/20 rounded-full flex items-center justify-center mb-6 relative z-20 animate-pulse-slow backdrop-blur-md border border-${config.color.split('-')[1]}-500/50`}>
                                        <Icon name="camera" size={32} className={config.color} />
                                    </div>
                                    <h3 className="font-bold dark:text-white text-lg relative z-20">Tap to Capture</h3>
                                    <input type="file" accept="image/*" capture="environment" onChange={handleFile} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-30" />
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="space-y-4 animate-slideUp">
                            {/* Dynamic Output Rendering based on Mode */}
                            {mode === 'face' && (
                                <div className="glass-panel p-6 rounded-3xl border-t-4 border-blue-500 space-y-4">
                                    <div className="flex items-center gap-3 border-b border-white/10 pb-4">
                                        <div className="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400"><Icon name="eye" size={24}/></div>
                                        <div><h3 className="font-black text-xl dark:text-white">Face Scan Result</h3><p className="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Biometric Readout</p></div>
                                    </div>
                                    <div><span className="text-xs font-bold text-slate-500 uppercase">Overall Assessment</span><p className="text-sm font-medium dark:text-white mt-1">{analysis.overallHealth}</p></div>
                                    <div className="grid grid-cols-2 gap-3 mt-2">
                                        <div className="bg-black/20 p-3 rounded-xl"><span className="text-[10px] text-slate-400 uppercase font-bold block">Hydration</span><span className="text-sm dark:text-blue-100 font-medium">{analysis.dehydrationLevel}</span></div>
                                        <div className="bg-black/20 p-3 rounded-xl"><span className="text-[10px] text-slate-400 uppercase font-bold block">Sleep</span><span className="text-sm dark:text-blue-100 font-medium">{analysis.sleepDeficit}</span></div>
                                    </div>
                                    <div className="bg-blue-500/10 p-4 rounded-xl mt-2"><span className="text-xs font-bold text-blue-400 uppercase block mb-1">AI Recommendation</span><p className="text-sm dark:text-blue-50">{analysis.recommendation}</p></div>
                                </div>
                            )}

                            {mode === 'food' && (
                                <div className="glass-panel p-6 rounded-3xl border-t-4 border-green-500 space-y-4">
                                    <div className="flex items-center gap-3 border-b border-white/10 pb-4">
                                        <div className="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center text-green-400"><Icon name="coffee" size={24}/></div>
                                        <div><h3 className="font-black text-xl dark:text-white">Food-to-Fuel Lens</h3><p className="text-[10px] text-green-400 font-bold uppercase tracking-widest">{analysis.nutritionalVibe}</p></div>
                                    </div>
                                    <div><span className="text-xs font-bold text-slate-500 uppercase">Predicted Energy Curve</span><p className="text-sm font-medium dark:text-white mt-1">{analysis.energyCurve}</p></div>
                                    
                                    {analysis.triggerWarnings && analysis.triggerWarnings.length > 0 && (
                                        <div className="bg-orange-500/10 border border-orange-500/30 p-3 rounded-xl">
                                            <span className="text-xs font-bold text-orange-400 uppercase flex items-center gap-1 mb-1"><Icon name="alert" size={12}/> Medical Triggers</span>
                                            <ul className="text-sm dark:text-orange-100 list-disc pl-4">{analysis.triggerWarnings.map((w,i)=><li key={i}>{w}</li>)}</ul>
                                        </div>
                                    )}
                                    <div className="bg-green-500/10 p-4 rounded-xl mt-2"><span className="text-xs font-bold text-green-400 uppercase block mb-1">Action Plan</span><p className="text-sm dark:text-green-50">{analysis.recommendation}</p></div>
                                </div>
                            )}

                            {mode === 'report' && (
                                <div className="glass-panel p-6 rounded-3xl border-t-4 border-indigo-500 space-y-4">
                                     <div className="flex items-center gap-3 border-b border-white/10 pb-4">
                                        <div className="w-12 h-12 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400"><Icon name="fileText" size={24}/></div>
                                        <div><h3 className="font-black text-xl dark:text-white">Report Breakdown</h3><p className="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Clinical Translation</p></div>
                                    </div>
                                    <div><span className="text-xs font-bold text-slate-500 uppercase">Diagnosis / Status</span><p className="text-lg font-bold dark:text-white mt-1">{analysis.diagnosisOrStatus}</p></div>
                                    <div><p className="text-sm font-medium dark:text-slate-300">{analysis.summary}</p></div>
                                    {analysis.abnormalValues && analysis.abnormalValues.length > 0 && (
                                        <div className="bg-red-500/10 p-3 rounded-xl">
                                            <span className="text-xs font-bold text-red-400 uppercase flex items-center gap-1 mb-1">Flagged Abnormalities</span>
                                            <ul className="text-sm dark:text-red-100 list-disc pl-4">{analysis.abnormalValues.map((w,i)=><li key={i}>{w}</li>)}</ul>
                                        </div>
                                    )}
                                    <div className="bg-indigo-500/10 p-4 rounded-xl"><span className="text-xs font-bold text-indigo-400 uppercase block mb-1">Recommendations</span><ul className="text-sm dark:text-indigo-50 list-disc pl-4">{analysis.recommendations.map((w,i)=><li key={i}>{w}</li>)}</ul></div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- 2️⃣ ROOT-CAUSE ENGINE (SYMPTOM CHECKER) ---
        const SymptomChecker = ({ user, logSymptom, setView, setEmergencyMode }) => {
            const showToast = useContext(ToastContext);
            const [step, setStep] = useState(1);
            const [selectedPart, setSelectedPart] = useState('');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [doctorMode, setDoctorMode] = useState(false);

            const analyze = async () => {
                setLoading(true);
                const modeStr = doctorMode ? "Use high-level clinical terminology, ICD-10 reference style, and deep pathological evidence." : "Use simple, clear, patient-friendly language.";
                const sys = `Analyze symptoms. Patient: Age ${user.age}, History: ${user.conditions}. ${modeStr} Return JSON strictly matching the schema. Estimate confidence percentage for each cause.`;
                try {
                    const data = await fetchGemini(`Symptoms: ${input}. Location: ${selectedPart}`, sys, null, Schemas.symptom);
                    setResult(data);
                    logSymptom(data); 
                    setStep(3);
                    if (data.isRedFlag) {
                        showToast("CRITICAL ALERT: Redirecting to SOS mode.", "error");
                        setTimeout(() => setEmergencyMode(true), 2500); 
                    }
                } catch (e) { showToast(e.message || "Analysis failed.", "error"); }
                finally { setLoading(false); }
            };

            return (
                <div className="h-full flex flex-col pb-10">
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-2"><button onClick={() => setView('dashboard')}><Icon name="x" className="text-slate-400" /></button><h2 className="text-xl font-bold dark:text-white">Diagnostic Engine</h2></div>
                        {step === 2 && (
                            <button onClick={() => setDoctorMode(!doctorMode)} className={`text-xs px-3 py-1 rounded-full border font-bold transition-colors ${doctorMode ? 'bg-purple-500/20 text-purple-400 border-purple-500' : 'bg-transparent text-slate-500 border-slate-500'}`}>
                                Clinical Mode {doctorMode ? 'ON' : 'OFF'}
                            </button>
                        )}
                    </div>

                    {step === 1 && <div className="flex-1 flex flex-col items-center"><BodyMap onSelect={(p) => { setSelectedPart(p); setStep(2); }} /></div>}
                    
                    {step === 2 && (
                        <div className="flex-1 space-y-4 animate-slideUp mt-4">
                            <div className="bg-teal-50 dark:bg-teal-900/20 p-3 rounded-xl flex items-center gap-2 text-teal-700 dark:text-teal-400 text-sm font-bold"><div className="w-2 h-2 bg-teal-500 rounded-full"></div> Focus Area: {selectedPart}</div>
                            <textarea value={input} onChange={e => setInput(e.target.value)} className="w-full h-40 bg-white dark:bg-night-800 p-4 rounded-2xl border border-slate-200 dark:border-slate-800 outline-none dark:text-white resize-none" placeholder="Describe symptoms in detail..."></textarea>
                            <button onClick={analyze} disabled={!input || loading} className="w-full py-4 bg-teal-600 text-white rounded-2xl font-black text-lg shadow-lg flex justify-center">
                                {loading ? <Icon name="loader" className="animate-spin" /> : 'Run Graph Analysis'}
                            </button>
                        </div>
                    )}

                    {step === 3 && result && (
                        <div className="space-y-4 animate-slideUp">
                            {result.isRedFlag && <div className="bg-red-600 text-white p-4 rounded-xl flex items-center gap-3 animate-pulse border-2 border-red-400 shadow-xl shadow-red-600/50"><Icon name="alert" size={32} /><div><p className="font-bold text-lg uppercase tracking-wider">Critical Trigger</p><p className="text-xs">Initiating Crisis protocol...</p></div></div>}
                            
                            <div className="glass-panel p-5 rounded-2xl border-t-2 border-teal-500">
                                <h3 className="font-bold dark:text-white mb-2">{doctorMode ? 'Clinical Interpretation' : 'Causal Summary'}</h3>
                                <p className="text-sm dark:text-slate-300">{doctorMode ? result.clinicalSummary || result.summary : result.summary}</p>
                            </div>
                            
                            {result.triggers && result.triggers.length > 0 && (
                                <div className="flex flex-wrap gap-2">
                                    {result.triggers.map((t, i) => <span key={i} className="text-[10px] bg-orange-500/10 text-orange-400 border border-orange-500/20 px-2 py-1 rounded-full uppercase font-bold tracking-wider">Trigger: {t}</span>)}
                                </div>
                            )}

                            <div className="space-y-3 mt-4">
                                <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Ranked Possible Causes</h4>
                                {result.causes && result.causes.map((c, i) => (
                                    <div key={i} className="p-4 bg-white/5 dark:bg-black/20 rounded-2xl border border-white/10 space-y-2 relative overflow-hidden backdrop-blur-sm">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-teal-500 opacity-50"></div>
                                        <div className="flex justify-between items-start">
                                            <span className="dark:text-white font-bold text-sm">{c.name}</span>
                                            <div className="text-right">
                                                <span className="text-teal-400 text-xs font-bold bg-teal-500/10 border border-teal-500/20 px-2 py-1 rounded-full ml-2">{c.prob}</span>
                                            </div>
                                        </div>
                                        <div className="w-full bg-black/40 rounded-full h-1.5 mt-2">
                                            <div className="bg-teal-500 h-1.5 rounded-full" style={{width: `${c.confidence || 50}%`}}></div>
                                        </div>
                                        <p className="text-xs text-slate-400 mt-2"><strong className="text-slate-500 dark:text-slate-300">Evidence:</strong> {c.evidence}</p>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setStep(1)} className="w-full py-4 bg-white/5 dark:text-white rounded-2xl font-bold mt-4 border border-white/10 hover:bg-white/10 transition-colors">Run New Scan</button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 3️⃣ SMART MEDICINE CABINET ---
        const MedicineCenter = ({ user, cabinet, updateCabinet }) => {
            const showToast = useContext(ToastContext);
            const [search, setSearch] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [loading, setLoading] = useState(false);

            const checkMed = async () => {
                if(!search) return; setLoading(true);
                const currentMeds = cabinet.map(c=>c.name).join(', ') || "None";
                const sys = `Check medicine: ${search}. User is ${user.age}yo. Current cabinet: [${currentMeds}]. Detect interactions! Categorize severityLevel as "Low", "Medium", or "High".`;
                try {
                    const data = await fetchGemini("Analyze medicine safety and interactions.", sys, null, Schemas.medicine);
                    setAnalysis(data);
                } catch(e) { showToast(e.message || "Fetch failed.", "error"); }
                setLoading(false);
            };

            const trackDose = (id) => {
                const now = new Date().getTime();
                const newCab = cabinet.map(m => {
                    if (m.id === id) {
                        const history = [...(m.history || []), now];
                        const recentDoses = history.filter(t => now - t < 86400000);
                        if (recentDoses.length > 4) {
                            showToast(`OVERUSE ALERT: You've taken ${m.name} ${recentDoses.length} times today!`, "warning");
                        } else {
                            showToast(`Dose Logged for ${m.name}`);
                        }
                        return { ...m, history };
                    }
                    return m;
                });
                updateCabinet(newCab);
            };

            return (
                <div className="space-y-4 pb-10 animate-fadeIn">
                    <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-bold dark:text-white">Smart Cabinet</h2> {analysis && <button onClick={() => setAnalysis(null)} className="text-slate-400 p-2 bg-white/5 rounded-full"><Icon name="x"/></button>}</div>
                    {!analysis ? (
                        <>
                            <div className="flex gap-2">
                                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Type new medicine..." className="flex-1 p-4 rounded-2xl bg-black/20 backdrop-blur-md border border-white/10 outline-none dark:text-white" />
                                <button onClick={checkMed} className="bg-teal-600 text-white px-6 rounded-2xl flex items-center font-bold shadow-lg">{loading ? <Icon name="loader" className="animate-spin" /> : 'Scan'}</button>
                            </div>
                            
                            <div className="space-y-4 mt-6">
                                {cabinet.length === 0 && <p className="text-slate-500 text-sm italic text-center py-6">Cabinet is empty. Add meds to track safety & interactions.</p>}
                                
                                {cabinet.map(m => {
                                    const recentDoses = (m.history || []).filter(t => new Date().getTime() - t < 604800000).length;
                                    return (
                                    <div key={m.id} className="glass-panel p-5 rounded-3xl relative overflow-hidden group">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <div className="dark:text-white font-black text-lg flex items-center gap-2"><div className="p-2 bg-teal-500/20 rounded-full"><Icon name="pill" size={16} className="text-teal-400"/></div> {m.name}</div>
                                                <div className="text-xs text-slate-400 mt-2 font-medium">{m.use}</div>
                                            </div>
                                            <button onClick={() => updateCabinet(cabinet.filter(c => c.id !== m.id))} className="text-red-400/50 hover:text-red-400 bg-red-400/10 p-2 rounded-full transition-colors"><Icon name="trash" size={16}/></button>
                                        </div>
                                        
                                        <div className="flex justify-between items-center mt-4 pt-4 border-t border-white/10">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                                                {recentDoses > 0 ? <span className="text-teal-400 bg-teal-400/10 px-2 py-1 rounded-md">{recentDoses} doses this week</span> : 'No recent doses'}
                                            </div>
                                            <button onClick={() => trackDose(m.id)} className="bg-white/10 text-white hover:bg-teal-500 hover:text-white font-bold px-5 py-2 rounded-xl text-xs active:scale-95 transition-colors">Take Dose</button>
                                        </div>
                                    </div>
                                )})}
                            </div>
                        </>
                    ) : (
                        <div className="animate-slideUp space-y-4">
                            <div className={`glass-panel p-6 rounded-3xl border-t-4 ${analysis.safety?.includes('Safe') ? 'border-teal-400' : 'border-red-400'}`}>
                                <h3 className="text-xl font-black dark:text-white flex justify-between items-center">{analysis.name} <span className={`text-[10px] uppercase font-bold px-3 py-1 rounded-full ${analysis.safety?.includes('Safe') ? 'bg-teal-400/20 text-teal-400' : 'bg-red-400/20 text-red-400'}`}>{analysis.safety}</span></h3>
                                <p className="dark:text-white mt-4 text-sm font-medium"><strong className="text-slate-400 text-xs uppercase block mb-1">Use</strong> {analysis.use}</p>
                                <p className="dark:text-white mt-3 text-sm font-medium"><strong className="text-slate-400 text-xs uppercase block mb-1">Alert</strong> {analysis.warning}</p>
                            </div>
                            
                            {analysis.interactions && analysis.interactions.length > 0 && analysis.interactions[0] !== "None" && (
                                <div className={`p-5 rounded-3xl border backdrop-blur-md ${analysis.severityLevel === 'High' ? 'bg-red-500/10 border-red-500/30 text-red-400' : 'bg-orange-500/10 border-orange-500/30 text-orange-400'}`}>
                                    <h4 className="text-xs font-bold uppercase flex items-center gap-2 mb-3 tracking-widest"><Icon name="alert" size={14}/> {analysis.severityLevel} Severity Interactions</h4>
                                    <ul className="text-sm list-disc pl-5 space-y-2 font-medium">
                                        {analysis.interactions.map((int, i) => <li key={i}>{int}</li>)}
                                    </ul>
                                </div>
                            )}
                            <button onClick={() => { updateCabinet([...cabinet, { ...analysis, id: Date.now(), history: [] }]); setAnalysis(null); setSearch(''); showToast("Added to Tracking"); }} className="w-full bg-teal-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg flex justify-center items-center gap-2 transform active:scale-95"><Icon name="plus" size={20} /> Add to Tracking</button>
                        </div>
                    )}
                </div>
            );
        };

        // --- 4️⃣ HEALTH PATTERN LAB ---
        const HealthPatternLab = ({ user }) => {
            const [aiInsight, setAiInsight] = useState("Analyzing your baseline data...");

            const chartData = useMemo(() => {
                const hist = user.history || [];
                return [...Array(7)].map((_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() - (6 - i));
                    const dateStr = d.toISOString().split('T')[0];
                    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short' }).charAt(0);
                    
                    const found = hist.find(x => x.date === dateStr);
                    const moodScoreMap = { '😢': 20, '😐': 50, '🙂': 80, '😁': 100 };
                    
                    return { day: dayLabel, water: found ? found.water : 0, moodScore: found ? (moodScoreMap[found.mood] || 50) : 0 };
                });
            }, [user.history]);

            useEffect(() => {
                const generateInsight = async () => {
                    const dataStr = JSON.stringify(chartData.map(d => ({ water: d.water, wellness: d.moodScore })));
                    const sys = `Analyze this user's hydration (ml) and wellness score (0-100) over 7 days: ${dataStr}. Give ONE short, punchy sentence correlating water intake and wellness.`;
                    try {
                        const response = await fetchGemini(`Find correlation in this data.`, sys, null, null);
                        const insightText = typeof response === 'string' ? response : (response.insight || response.text || "Your hydration highly correlates with better mood metrics.");
                        setAiInsight(insightText.replace(/['"]+/g, ''));
                    } catch (e) { setAiInsight("Hydration metrics are strongly correlating with your mood baseline."); }
                };
                if(user.history && user.history.length > 1) { generateInsight(); }
            }, [chartData, user.history]);

            return (
                <div className="space-y-6 animate-fadeIn pb-10">
                    <h2 className="text-2xl font-bold dark:text-white flex items-center gap-2"><Icon name="barChart" className="text-teal-500"/> Pattern Lab</h2>
                    <p className="text-slate-400 text-sm">Interactive analytics mapping your habits directly to your wellbeing based on real daily logs.</p>

                    <div className="glass-panel p-6 rounded-3xl">
                        <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Hydration vs Wellness Matrix</h3>
                        <div className="flex justify-between items-end h-40 pb-2 border-b border-white/10">
                            {chartData.map((d, i) => {
                                const waterGoal = user.waterGoal || 2000;
                                const waterPct = Math.min(100, (d.water / waterGoal) * 100);
                                return (
                                    <div key={i} className="flex flex-col items-center justify-end w-1/7 gap-1 group relative">
                                        <div className="absolute -top-10 opacity-0 group-hover:opacity-100 text-[10px] bg-black text-white px-2 py-1 rounded-md transition-opacity whitespace-nowrap z-10 pointer-events-none font-bold">
                                            {d.water}ml / {d.moodScore}%
                                        </div>
                                        <div className="w-5 bg-gradient-to-t from-blue-600 to-blue-400 rounded-t-md transition-all duration-1000 shadow-[0_0_10px_rgba(59,130,246,0.5)]" style={{ height: `${waterPct}%`, minHeight: '4px' }}></div>
                                        <div className="w-5 bg-gradient-to-t from-gold-600 to-gold-400 rounded-t-md absolute bottom-0 opacity-90 transition-all duration-1000" style={{ height: `${d.moodScore}%`, minHeight: '4px' }}></div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-between text-[10px] font-bold text-slate-500 mt-3 px-1">
                            {chartData.map((d, i) => <span key={i} className="w-5 text-center">{d.day}</span>)}
                        </div>
                        <div className="flex justify-center gap-6 mt-6 text-[10px] uppercase font-bold tracking-widest">
                            <div className="flex items-center gap-2 text-blue-400"><div className="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_5px_rgba(59,130,246,0.8)]"></div> Intake</div>
                            <div className="flex items-center gap-2 text-gold-400"><div className="w-3 h-3 bg-gold-400 rounded-full shadow-[0_0_5px_rgba(250,204,21,0.8)]"></div> Wellness</div>
                        </div>
                        
                        <div className="mt-6 bg-teal-500/10 border border-teal-500/20 p-4 rounded-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-1 h-full bg-teal-400"></div>
                            <span className="text-[10px] font-bold text-teal-400 uppercase block mb-1 tracking-widest">AI Correlation Engine</span>
                            <p className="text-sm dark:text-slate-200 font-medium italic">"{aiInsight}"</p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 6️⃣ CLINICAL MODE ---
        const ClinicalMode = ({ user }) => {
            const showToast = useContext(ToastContext);
            const [report, setReport] = useState(null);
            const [loading, setLoading] = useState(false);

            const generateReport = async () => {
                setLoading(true);
                // Safe access mapping to prevent undefined crashes on badly recorded symptom logs
                const symLogStr = (user.symptomLogs || []).map(l => l?.report?.summary || "").filter(Boolean).join(" | ");
                const cabinetStr = (user.cabinet || []).map(c=>c.name).join(', ');
                
                const sys = `You are an AI Medical Scribe preparing a Consultation Companion. Patient: ${user.name}, Age: ${user.age}, Conditions: ${user.conditions || 'None'}. Cabinet: ${cabinetStr || 'None'}. Recent symptom logs: ${symLogStr || 'None'}. Provide a deep progression analysis, concerns, and questions to ask the doctor. ALWAYS RETURN VALID JSON MATCHING THE SCHEMA!`;
                
                try {
                    const data = await fetchGemini("Generate doctor prep brief.", sys, null, Schemas.doctorExport);
                    setReport(data);
                } catch(e) { 
                    showToast(e.message || "Generation failed.", "error"); 
                }
                setLoading(false);
            };

            return (
                <div className="space-y-6 pb-10 animate-fadeIn">
                    <h2 className="text-2xl font-bold dark:text-white flex items-center gap-2 print-only-hide"><Icon name="fileText" className="text-purple-500"/> Consultation Prep</h2>
                    {!report ? (
                        <div className="text-center py-12 glass-panel rounded-3xl print-only-hide border border-purple-500/20 shadow-[0_0_30px_rgba(168,85,247,0.1)]">
                            <div className="w-20 h-20 bg-purple-500/10 rounded-full flex items-center justify-center mx-auto mb-6 text-purple-400 border border-purple-500/30 shadow-[0_0_20px_rgba(168,85,247,0.2)]"><Icon name="clock" size={40} /></div>
                            <h3 className="text-xl font-black dark:text-white mb-2">Doctor Visit Brief</h3>
                            <p className="text-slate-400 text-sm mb-8 px-6 font-medium">Generate an AI-structured clinical brief containing your timeline progression and medication history to hand to your physician.</p>
                            <button onClick={generateReport} disabled={loading} className="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-lg shadow-lg shadow-purple-500/30 active:scale-95 transition-transform">
                                {loading ? 'Compiling Profile...' : 'Generate PDF Brief'}
                            </button>
                        </div>
                    ) : (
                        <div className="print-area glass-panel p-8 rounded-3xl bg-white dark:bg-night-900 border-t-8 border-purple-500 text-black dark:text-white animate-slideUp">
                            <div className="flex justify-between border-b border-slate-200 dark:border-slate-800 pb-6 mb-6">
                                <div><h1 className="text-3xl font-black tracking-tight">Clinical Brief</h1><p className="text-xs text-slate-500 uppercase tracking-widest mt-1">Generated by Bhat Care AI</p></div>
                                <div className="text-right text-sm font-bold text-slate-600 dark:text-slate-400"><p className="text-lg text-black dark:text-white">{user.name}</p><p>Age: {user.age}</p><p className="text-[10px] font-normal mt-1">{new Date().toLocaleDateString()}</p></div>
                            </div>
                            
                            <h3 className="text-[10px] font-bold text-purple-500 uppercase mt-6 mb-2 tracking-widest border-b border-slate-100 dark:border-slate-800 pb-2">AI Executive Summary</h3>
                            <p className="text-sm dark:text-slate-200 mb-6 font-medium leading-relaxed">{report.summary}</p>
                            
                            <h3 className="text-[10px] font-bold text-teal-600 uppercase mt-6 mb-2 tracking-widest border-b border-slate-100 dark:border-slate-800 pb-2">Symptom Progression</h3>
                            <p className="text-sm dark:text-slate-200 mb-6 font-medium leading-relaxed">{report.progressionAnalysis}</p>

                            <div className="mb-6 bg-black/5 dark:bg-white/5 p-4 rounded-xl border border-black/10 dark:border-white/10">
                                <h3 className="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">Active Medication Registry</h3>
                                {(user.cabinet || []).length > 0 ? (
                                    <ul className="text-sm dark:text-slate-200 space-y-2 font-medium">
                                        {user.cabinet.map(c => <li key={c.id} className="flex items-start gap-2"><div className="mt-1 w-1.5 h-1.5 rounded-full bg-teal-500 shrink-0"></div> <div><strong>{c.name}</strong> - {c.use} <span className="text-xs text-slate-500 ml-1">({c.history ? c.history.length : 0} logs)</span></div></li>)}
                                    </ul>
                                ) : <p className="text-xs text-slate-500 italic">No active medications recorded.</p>}
                            </div>

                            <h3 className="text-[10px] font-bold text-red-500 uppercase mt-6 mb-2 tracking-widest border-b border-slate-100 dark:border-slate-800 pb-2">Active Red Flags</h3>
                            <ul className="list-disc pl-5 text-sm dark:text-slate-200 mb-6 space-y-2 font-medium">
                                {report?.concerns?.length ? report.concerns.map((c, i) => <li key={i} className="pl-1">{c}</li>) : <li className="pl-1 italic text-slate-500">None detected.</li>}
                            </ul>

                            <h3 className="text-[10px] font-bold text-blue-500 uppercase mt-6 mb-2 tracking-widest border-b border-slate-100 dark:border-slate-800 pb-2">Suggested Physician Questions</h3>
                            <ul className="list-disc pl-5 text-sm dark:text-slate-200 space-y-2 font-medium">
                                {report?.questionsToAsk?.length ? report.questionsToAsk.map((q, i) => <li key={i} className="pl-1">{q}</li>) : <li className="pl-1 italic text-slate-500">None generated.</li>}
                            </ul>
                            
                            <div className="print-only mt-12 border-t border-slate-300 pt-4 text-center text-[10px] uppercase tracking-widest text-slate-500">
                                This report is AI-generated for informational purposes. Verify with a licensed professional.
                            </div>

                            <button onClick={() => window.print()} className="print-only-hide mt-10 w-full bg-white text-black py-4 rounded-2xl font-black text-lg shadow-xl flex justify-center items-center gap-2 transform active:scale-95"><Icon name="fileText" size={20}/> Print / Save PDF</button>
                        </div>
                    )}
                </div>
            )
        };

        const ToolsHub = ({ setView }) => {
            const tools = [
                { id: 'faceScan', name: 'Face Scan', icon: 'eye', color: 'text-blue-400', bg: 'bg-gradient-to-br from-blue-500/20 to-blue-600/10 border border-blue-500/30', desc: 'Biometric Readout' },
                { id: 'foodScan', name: 'Food Lens', icon: 'coffee', color: 'text-green-400', bg: 'bg-gradient-to-br from-green-500/20 to-green-600/10 border border-green-500/30', desc: 'Energy Predictor' },
                { id: 'medicine', name: 'Smart Cabinet', icon: 'pill', color: 'text-teal-400', bg: 'bg-gradient-to-br from-teal-500/20 to-teal-600/10 border border-teal-500/30', desc: 'Drug Interaction' },
                { id: 'report', name: 'Report AI', icon: 'camera', color: 'text-indigo-400', bg: 'bg-gradient-to-br from-indigo-500/20 to-indigo-600/10 border border-indigo-500/30', desc: 'Translate Labs' },
                { id: 'lab', name: 'Pattern Lab', icon: 'barChart', color: 'text-gold-400', bg: 'bg-gradient-to-br from-gold-500/20 to-gold-600/10 border border-gold-500/30', desc: 'Habit Matrix' },
                { id: 'clinical', name: 'Doc Export', icon: 'fileText', color: 'text-purple-400', bg: 'bg-gradient-to-br from-purple-500/20 to-purple-600/10 border border-purple-500/30', desc: 'PDF Scribe' },
            ];
            return (
                <div className="space-y-6 animate-fadeIn pb-10">
                    <h2 className="text-2xl font-bold dark:text-white">Health Tools</h2>
                    <div className="grid grid-cols-2 gap-4">
                        {tools.map(t => (
                            <button key={t.id} onClick={() => setView(t.id)} className={`glass-panel p-5 rounded-3xl flex flex-col items-center text-center gap-3 transition-transform hover:scale-105 ${t.bg} relative overflow-hidden group`}>
                                <div className="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                <div className={`w-14 h-14 rounded-full bg-black/20 backdrop-blur-sm flex items-center justify-center shadow-inner ${t.color}`}><Icon name={t.icon} size={28} /></div>
                                <div>
                                    <span className="font-bold dark:text-white block text-sm">{t.name}</span>
                                    <span className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mt-1 block">{t.desc}</span>
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        // --- PROFILE VIEW ---
        const ProfileView = ({ user, setUser, setAppState }) => {
            const [showWall, setShowWall] = useState(false);
            const handleChange = (e) => setUser({ [e.target.name]: e.target.value });
            
            const wipeData = () => {
                localStorage.removeItem('bhat_care_v5');
                localStorage.removeItem('bhat_care_user');
                localStorage.removeItem('bhat_care_cabinet');
                window.location.reload();
            };

            return (
                <div className="space-y-4 pb-10 animate-fadeIn">
                    <h2 className="text-xl font-bold dark:text-white">Profile Settings</h2>
                    
                    <div className="glass-panel p-6 rounded-3xl space-y-4">
                        <input name="name" value={user.name} onChange={handleChange} placeholder="Name" className="w-full bg-transparent border-b border-white/10 py-2 dark:text-white outline-none focus:border-teal-500 transition-colors font-medium" />
                        <div className="grid grid-cols-2 gap-4">
                            <input name="age" type="number" value={user.age} onChange={handleChange} placeholder="Age" className="w-full bg-transparent border-b border-white/10 py-2 dark:text-white outline-none focus:border-teal-500 transition-colors font-medium" />
                            <input name="waterGoal" type="number" value={user.waterGoal} onChange={handleChange} placeholder="Water Goal(ml)" className="w-full bg-transparent border-b border-white/10 py-2 dark:text-white outline-none focus:border-teal-500 transition-colors font-medium" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <input name="weight" type="number" value={user.weight} onChange={handleChange} placeholder="Weight (kg)" className="w-full bg-transparent border-b border-white/10 py-2 dark:text-white outline-none focus:border-teal-500 transition-colors font-medium" />
                            <input name="height" type="number" value={user.height} onChange={handleChange} placeholder="Height (cm)" className="w-full bg-transparent border-b border-white/10 py-2 dark:text-white outline-none focus:border-teal-500 transition-colors font-medium" />
                        </div>
                        <input name="conditions" value={user.conditions} onChange={handleChange} placeholder="Medical Conditions" className="w-full bg-transparent border-b border-white/10 py-2 dark:text-white outline-none focus:border-teal-500 transition-colors font-medium" />
                    </div>
                    
                    <div className="glass-panel p-6 rounded-3xl border-l-4 border-red-500">
                        <h3 className="text-[10px] font-bold text-red-500 mb-2 uppercase tracking-widest">Crisis Contact</h3>
                        <input name="emergencyContactPhone" type="tel" value={user.emergencyContactPhone} onChange={handleChange} placeholder="Emergency Phone" className="w-full bg-transparent border-b border-red-500/30 py-2 text-red-400 outline-none focus:border-red-500 font-medium" />
                    </div>

                    <button onClick={() => setShowWall(true)} className="w-full bg-gradient-to-br from-gold-400 to-gold-600 p-4 rounded-2xl font-black text-sm text-black flex justify-center items-center gap-2 shadow-lg shadow-gold-500/20 mt-4 tracking-wider uppercase">
                        <Icon name="award" size={18}/> About the Creator
                    </button>

                    <div className="text-center mt-8">
                        <button onClick={() => { if(confirm("Are you sure? This deletes ALL family pod data from this device.")) wipeData(); }} className="text-red-500/80 text-[10px] font-bold tracking-widest uppercase hover:text-red-500 transition-colors">Wipe All App Data & Reset</button>
                    </div>

                    {/* CREATOR WALL MODAL */}
                    {showWall && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl animate-fadeIn" onClick={() => setShowWall(false)}>
                            <div className="bg-night-900 border border-gold-500/30 p-10 rounded-[2rem] max-w-sm w-full text-center relative overflow-hidden shadow-[0_0_100px_rgba(212,167,44,0.15)]" onClick={e => e.stopPropagation()}>
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-gold-500 to-transparent"></div>
                                <div className="w-28 h-28 mx-auto bg-gradient-to-br from-gold-400 to-gold-600 rounded-full flex items-center justify-center mb-8 shadow-xl shadow-gold-500/20 animate-float border-4 border-black">
                                    <span className="font-cinzel font-bold text-6xl text-night-950">B</span>
                                </div>
                                <h3 className="text-gold-400 font-cinzel text-sm font-bold mb-2 tracking-[0.3em] uppercase">Architect & Visionary</h3>
                                <h2 className="text-3xl font-black text-white tracking-widest mb-6 font-cinzel">BHAT BOYKA</h2>
                                <p className="text-slate-400 text-sm italic mb-10 leading-relaxed font-medium">"Pioneering the intersection of artificial intelligence and proactive human health."</p>
                                <button onClick={() => setShowWall(false)} className="px-10 py-4 bg-white/5 border border-gold-500/50 text-gold-400 rounded-2xl text-xs font-bold hover:bg-gold-500/10 transition-colors w-full tracking-widest uppercase">Close Core</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const EmergencyScreen = ({ onClose, user }) => (
            <div className="fixed inset-0 bg-black z-[100] flex flex-col p-8 animate-pulse emergency-mode print-only-hide">
                <div className="flex justify-between items-center mb-12"><h1 className="text-4xl font-black text-red-600 tracking-tighter">CRISIS SOS</h1><button onClick={onClose} className="px-6 py-2 text-red-600 font-bold border-2 border-red-600 rounded-full text-xs tracking-widest uppercase">Abort</button></div>
                <a href="tel:112" className="block w-full bg-red-600 text-white text-center py-8 rounded-3xl text-3xl font-black shadow-[0_0_40px_rgba(220,38,38,0.5)] tracking-wide">CALL 112</a>
                {user.emergencyContactPhone && <a href={`tel:${user.emergencyContactPhone}`} className="mt-6 block w-full bg-transparent text-red-600 border-4 border-red-600 text-center py-6 rounded-3xl text-xl font-black tracking-wide">CALL EMERGENCY CONTACT</a>}
                <div className="mt-auto border border-red-900 p-8 rounded-3xl bg-red-950/20 backdrop-blur-md">
                    <h3 className="text-red-500 font-black mb-4 uppercase tracking-widest text-sm">Automated Directives</h3>
                    <ul className="text-red-400 text-sm list-disc pl-5 space-y-3 font-medium">
                        <li>Remain calm and breathe slowly.</li>
                        <li>Unlock front door for emergency responders.</li>
                        <li>Sit or lie down if feeling faint.</li>
                    </ul>
                </div>
            </div>
        );

        const App = () => (
            <ToastProvider>
                <MainApp />
            </ToastProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
    </html>
